{% extends "base.html" %}

{% block title %}Browse Papers{% endblock %}

{% block content %}
<section class="workspace" data-page="browse">
  <aside class="filters-panel">
    <div class="section-head">
      <h1>Browse</h1>
      <button class="ghost-button" id="clear-filters" type="button">Clear</button>
    </div>
    <label>
      Course
      <select id="course-filter">
        <option value="">All courses</option>
      </select>
    </label>
    <label>
      Branch
      <select id="branch-filter">
        <option value="">All branches</option>
      </select>
    </label>
    <label>
      Exam
      <select id="exam-category-filter">
        <option value="">All exams</option>
      </select>
    </label>
    <label>
      Session
      <select id="session-filter">
        <option value="">All sessions</option>
      </select>
    </label>
    <label>
      Semester
      <select id="semester-filter">
        <option value="">All semesters</option>
      </select>
    </label>
    <label>
      Year
      <select id="year-filter">
        <option value="">All years</option>
      </select>
    </label>
  </aside>

  <section class="results-shell">
    <div class="section-head">
      <h2>Papers</h2>
      <span id="result-count">0 papers</span>
    </div>
    <div id="result-status" class="result-status" aria-live="polite"></div>
    <div id="results" class="paper-list" aria-live="polite"></div>
    <div class="results-actions">
      <button class="ghost-button" id="load-more" type="button" hidden>Load more</button>
    </div>
  </section>
</section>
{% endblock %}
